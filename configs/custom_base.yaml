AUG:
  COLOR_JITTER: 0.4
  #RAND_AUGMENT: "Identity"
DATA:
  BATCH_SIZE: 256
  DATASET: "cifar10"
  IMG_SIZE: 32
MODEL:
  NAME: resnet18
  NUM_CLASSES: 10
  DROP_RATE: 0.0
TRAIN:
  EPOCHS: 100
  WARMUP_EPOCHS: 20
  LR: 1e-3
  MIN_LR: 1e-4
  WARMUP_LR: 1e-4
  LR_SCHEDULER:
    NAME: "cosine"
  OPTIMIZER:
    NAME: "adamw"
    EPS: 1e-8
    BETAS: (0.9, 0.999)
    MOMENTUM: 0.9
OUTPUT: "output/customnet_mimgnet"
SAVE_FREQ: 50 
PRINT_FREQ: 500
