name: vision-zoo
channels:
  - nvidia
  - pytorch
  - conda-forge
dependencies:
  - python=3.10
  - numpy
  - pip

  - pytorch::pytorch
  - pytorch::torchvision
  - pytorch::torchaudio

  - pytorch-cuda=11.8

  - tqdm
  - pylint
  - black
  - yacs
  - termcolor

  - pip:
    - matplotlib
    - h5py
    - fvcore
    - timm